# ============================================================================
# 基础模型配置模板
# ============================================================================
# 本文件定义了模型微调所需的所有配置参数及其说明。
# 各模型专用配置文件继承此模板，只需修改特定参数即可。
# ============================================================================
#
# 使用方式:
# 1. 复制此模板，重命名为模型专用配置文件（如 gemma4_e4b_config.yaml）
# 2. 根据模型特性修改相关参数
# 3. 在notebook中通过 config_loader 加载配置
#
# ============================================================================

# ----------------------------------------------------------------------------
# 模型基本信息
# ----------------------------------------------------------------------------
model:
  name: "" # 模型名称标识（如 "gemma4_e4b"）
  family: "" # 模型家族（如 "gemma", "qwen", "llama"）
  version: "" # 模型版本（如 "E4B", "4B", "3B"）
  base_model_path: "" # 基础模型权重路径
  description: "" # 模型描述

# ----------------------------------------------------------------------------
# 数据准备配置
# ----------------------------------------------------------------------------
data_preparation:
  # 坐标归一化模式 - 控制目标检测框的坐标表示方式
  # 可选值:
  #   - "raw": 原始像素坐标，不归一化
  #   - "norm_1": 归一化到 [0, 1] 范围
  #   - "norm_100": 归一化到 [0, 100] 范围
  #   - "norm_1000": 归一化到 [0, 1000] 范围（Gemma4推荐）
  coord_norm: "norm_1000"

  # 坐标格式 - 控制坐标输出的排列顺序
  # 可选值:
  #   - "xyxy": [x_min, y_min, x_max, y_max]（传统格式）
  #   - "yxyx": [y_min, x_min, y_max, x_max]（Gemma4格式）
  #   - "xywh": [x, y, width, height]（YOLO格式）
  #   - "cxcywh": [center_x, center_y, width, height]（COCO格式）
  # 注意: 不同模型要求不同格式，请参考模型文档
  coord_format: "xyxy"

  # 输出格式 - 控制响应内容的结构
  # 可选值:
  #   - "labelme_text": 中文自由文本格式
  #   - "box_2d_json": JSON数组格式（推荐）
  output_format: "box_2d_json"

  # Prompt配置
  prompt:
    lang: "zh" # Prompt语言: "en" 或 "zh"
    style: "descriptive" # Prompt风格: "simple"/"descriptive"/"cot"

  # 数据划分
  split:
    ratio: "8:1:1" # 训练/验证/测试比例
    method: "random" # 划分方法: "random"/"sequential"/"stratified"
    seed: null # 随机种子（null表示不固定）

  # 数据过滤
  filter:
    class_whitelist: [] # 类别白名单（空列表表示不限制）
    class_blacklist: [] # 类别黑名单
    class_remap: {} # 类别重映射 {"原类别": "新类别"}
    shape_types: # 要处理的标注形状类型
      - "rectangle"
      - "polygon"
    min_bbox_size: 2 # 最小bbox尺寸阈值（像素）
    keep_empty: false # 是否保留空标注图片

# ----------------------------------------------------------------------------
# 模型加载配置
# ----------------------------------------------------------------------------
model_loading:
  max_seq_length: 2048 # 最大序列长度

  # 量化设置
  quantization:
    load_in_4bit: true # 是否使用4-bit量化
    load_in_8bit: false # 是否使用8-bit量化

  # 注意力机制实现
  attention:
    implementation: "sdpa" # 可选: "sdpa"/"flash_attention_2"/"eager"

  # 其他加载选项
  options:
    use_cache: true # 是否使用KV缓存
    trust_remote_code: false # 是否信任远程代码

# ----------------------------------------------------------------------------
# LoRA微调配置
# ----------------------------------------------------------------------------
lora:
  r: 32 # LoRA秩（低秩矩阵维度）
  # 取值范围: 4-64，常见: 8/16/32
  # 较大值增加表达能力但消耗更多资源

  alpha: 32 # LoRA缩放因子
  # 通常设置为与r相同的值
  # scaling = alpha / r

  dropout: 0 # LoRA Dropout率
  # Unsloth推荐设置为0

  target_modules: # LoRA应用的目标模块
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

  bias: "none" # 偏置处理方式: "none"/"all"/"lora_only"
  use_rslora: false # 是否使用RSLoRA（秩稳定LoRA）

# ----------------------------------------------------------------------------
# 训练配置
# ----------------------------------------------------------------------------
training:
  # 基础训练参数
  num_epochs: 1 # 训练轮数
  per_device_batch_size: 8 # 每GPU批次大小
  gradient_accumulation_steps: 2 # 梯度累积步数

  # 学习率配置
  learning_rate: 2e-5 # 基础学习率
  # 取值范围: 1e-6 ~ 1e-4
  lr_scaling: "sqrt" # 学习率缩放策略
  # 可选: "none"/"linear"/"sqrt"
  warmup_ratio: 0.1 # 预热比例（占总训练步数）

  # 优化器配置
  optimizer:
    type: "adamw_8bit" # 优化器类型
    weight_decay: 0.01 # 权重衰减
    max_grad_norm: 1.0 # 最大梯度裁剪

  # 精度设置
  precision:
    bf16: true # 是否使用BF16精度
    fp16: false # 是否使用FP16精度
    tf32: true # 是否使用TF32加速（A100 GPU）

  # Vision模型专用设置
  vision:
    enabled: true # 是否启用视觉模式
    image_width: 896 # 图像宽度
    image_height: 896 # 图像高度
    image_load_mode: "lazy" # 图像加载模式: "lazy"/"preload"

# ----------------------------------------------------------------------------
# 分布式训练配置
# ----------------------------------------------------------------------------
distributed:
  mode: "ddp" # 分布式模式: "single", "ddp", "fsdp", "device_map", "nd_parallel", "auto", "multi_node", "compare"
  num_gpus: 8 # GPU数量

  # DDP配置
  ddp:
    backend: "nccl" # DDP后端

  # FSDP配置（仅在mode="fsdp"时生效）
  fsdp:
    sharding_strategy: "FULL_SHARD" # 分片策略
    auto_wrap_policy: "TRANSFORMER_BASED_WRAP"
    backward_prefetch: "BACKWARD_PRE"
    cpu_offload: false # 是否卸载到CPU
    min_num_params: 1000 # 最小参数数量阈值

# ----------------------------------------------------------------------------
# 数据加载配置
# ----------------------------------------------------------------------------
dataloader:
  num_workers: 4 # 数据加载线程数
  prefetch_factor: 4 # 预取因子
  pin_memory: true # 是否固定内存
  persistent_workers: true # 是否保持worker存活
  drop_last: false # 是否丢弃最后不完整批次

# ----------------------------------------------------------------------------
# 输出与日志配置
# ----------------------------------------------------------------------------
output:
  base_dir: "models/finetuned" # 输出基础目录
  save_strategy: "steps" # 保存策略: "steps"/"epoch"/"no"
  save_steps: 500 # 保存间隔步数
  save_total_limit: 3 # 最大保存数量

  logging:
    log_level: "INFO" # 日志级别
    log_steps: 10 # 日志记录间隔
    report_to: "tensorboard" # 报告目标: "tensorboard"/"wandb"/"none"

# ----------------------------------------------------------------------------
# 验证与评估配置
# ----------------------------------------------------------------------------
evaluation:
  eval_strategy: "steps" # 验证策略: "steps"/"epoch"/"no"
  eval_steps: 100 # 验证间隔步数
  eval_on_start: false # 是否在训练开始前验证

  metrics:
    - "loss"
    - "accuracy"

  post_training_eval:
    auto_run: false # 是否自动运行训练后评估
    raise_on_error: false # 评估失败时是否抛出异常

# ----------------------------------------------------------------------------
# 推理配置
# ----------------------------------------------------------------------------
inference:
  max_new_tokens: 128 # 最大新生成token数
  temperature: 0.1 # 温度参数（越低越确定）
  top_p: 0.9 # Top-p采样
  top_k: 50 # Top-k采样
  do_sample: true # 是否采样（否则贪婪解码）
